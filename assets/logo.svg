<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Lighthouse Guard Logo">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#1a2744"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>

    <!-- Shield gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f1f3d"/>
    </linearGradient>

    <!-- Shield stroke gradient -->
    <linearGradient id="shieldStroke" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a9eff"/>
      <stop offset="100%" stop-color="#1a56b0"/>
    </linearGradient>

    <!-- Lighthouse body gradient -->
    <linearGradient id="towerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c8d4e8"/>
      <stop offset="50%" stop-color="#e8eef8"/>
      <stop offset="100%" stop-color="#a0b0cc"/>
    </linearGradient>

    <!-- Lantern glow -->
    <radialGradient id="lanternGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="60%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>

    <!-- Beam gradient -->
    <linearGradient id="beamL" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beamR" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beamT" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>

    <!-- Clip to circle -->
    <clipPath id="circle">
      <circle cx="100" cy="100" r="95"/>
    </clipPath>
  </defs>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="98" fill="none" stroke="url(#shieldStroke)" stroke-width="1" opacity="0.4"/>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGrad)"/>

  <!-- Stars (subtle) -->
  <g fill="#ffffff" opacity="0.4">
    <circle cx="30"  cy="35"  r="0.8"/>
    <circle cx="55"  cy="22"  r="0.6"/>
    <circle cx="80"  cy="32"  r="0.5"/>
    <circle cx="145" cy="28"  r="0.7"/>
    <circle cx="165" cy="45"  r="0.5"/>
    <circle cx="170" cy="30"  r="0.8"/>
    <circle cx="40"  cy="60"  r="0.5"/>
    <circle cx="22"  cy="80"  r="0.6"/>
    <circle cx="175" cy="70"  r="0.6"/>
  </g>

  <!-- Light beams from lantern (behind lighthouse) -->
  <!-- Left beam -->
  <polygon points="97,78 32,50 42,90" fill="url(#beamL)" clip-path="url(#circle)"/>
  <!-- Right beam -->
  <polygon points="103,78 168,50 158,90" fill="url(#beamR)" clip-path="url(#circle)"/>
  <!-- Top beam -->
  <polygon points="100,75 82,18 118,18" fill="url(#beamT)" clip-path="url(#circle)"/>

  <!-- === LIGHTHOUSE === -->

  <!-- Base platform -->
  <rect x="80" y="152" width="40" height="8" rx="3" fill="#3a4a6b"/>
  <rect x="75" y="158" width="50" height="6" rx="3" fill="#2a3a5b"/>

  <!-- Tower body (trapezoid) -->
  <path d="M88,152 L92,110 L108,110 L112,152 Z" fill="url(#towerGrad)" filter="url(#shadow)"/>

  <!-- Red bands on tower -->
  <path d="M88.8,148 L111.2,148 L111.8,142 L88.2,142 Z" fill="#dc2626" opacity="0.85"/>
  <path d="M89.8,134 L110.2,134 L110.8,128 L89.2,128 Z" fill="#dc2626" opacity="0.85"/>
  <path d="M90.8,120 L109.2,120 L109.8,114 L90.2,114 Z" fill="#dc2626" opacity="0.85"/>

  <!-- Light highlight on tower (right side) -->
  <path d="M108,110 L112,152 L109,152 L105,110 Z" fill="#ffffff" opacity="0.12"/>

  <!-- Upper tower / watch room support -->
  <path d="M92,110 L90,100 L110,100 L108,110 Z" fill="#b8c8e0"/>

  <!-- Balcony rail -->
  <rect x="86" y="98" width="28" height="3" rx="1.5" fill="#8a9ab8"/>
  <!-- Rail posts -->
  <line x1="90"  y1="98" x2="90"  y2="94" stroke="#8a9ab8" stroke-width="1"/>
  <line x1="96"  y1="98" x2="96"  y2="94" stroke="#8a9ab8" stroke-width="1"/>
  <line x1="100" y1="98" x2="100" y2="94" stroke="#8a9ab8" stroke-width="1"/>
  <line x1="104" y1="98" x2="104" y2="94" stroke="#8a9ab8" stroke-width="1"/>
  <line x1="110" y1="98" x2="110" y2="94" stroke="#8a9ab8" stroke-width="1"/>
  <rect x="86" y="93" width="28" height="2" rx="1" fill="#8a9ab8"/>

  <!-- Lantern room walls -->
  <rect x="88" y="80" width="24" height="16" rx="2" fill="#1a2744"/>

  <!-- Lantern windows (glowing) -->
  <rect x="90" y="82" width="8" height="10" rx="1" fill="#fde68a" filter="url(#glow)" opacity="0.95"/>
  <rect x="100" y="82" width="8" height="10" rx="1" fill="#fde68a" filter="url(#glow)" opacity="0.95"/>

  <!-- Lantern room border -->
  <rect x="88" y="80" width="24" height="16" rx="2" fill="none" stroke="#4a6a9a" stroke-width="0.8"/>

  <!-- Lantern roof -->
  <path d="M85,80 L100,65 L115,80 Z" fill="#8a9ab8" filter="url(#shadow)"/>
  <!-- Roof highlight -->
  <path d="M100,65 L115,80 L110,80 L100,68 Z" fill="#ffffff" opacity="0.15"/>

  <!-- Finial cap -->
  <ellipse cx="100" cy="65" rx="5" ry="2.5" fill="#6a7a9a"/>
  <rect x="99.2" y="58" width="1.6" height="7" rx="0.8" fill="#6a7a9a"/>
  <circle cx="100" cy="57" r="2" fill="#fde68a" filter="url(#glow)"/>

  <!-- Ambient glow behind lantern -->
  <circle cx="100" cy="88" r="22" fill="url(#lanternGlow)" opacity="0.18" clip-path="url(#circle)"/>

  <!-- === WATER / WAVES === -->
  <g clip-path="url(#circle)">
    <!-- Water base -->
    <rect x="5" y="168" width="190" height="32" fill="#0a1628" opacity="0.9"/>

    <!-- Wave 1 -->
    <path d="M5,170 Q30,163 55,170 Q80,177 105,170 Q130,163 155,170 Q180,177 200,170 L200,200 L5,200 Z"
          fill="#0f2244" opacity="0.8"/>

    <!-- Wave 2 -->
    <path d="M5,178 Q35,171 65,178 Q95,185 125,178 Q155,171 195,178 L200,200 L5,200 Z"
          fill="#142a52" opacity="0.7"/>

    <!-- Wave highlight lines -->
    <path d="M10,172 Q40,166 70,172 Q100,178 130,172 Q160,166 195,172"
          stroke="#2a5a9a" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M5,180 Q40,174 75,180 Q110,186 145,180 Q170,175 198,180"
          stroke="#2a5a9a" stroke-width="0.8" fill="none" opacity="0.35"/>
  </g>

  <!-- Outer glow ring -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.3"/>
  <circle cx="100" cy="100" r="95" fill="none" stroke="#60a5fa" stroke-width="0.5" opacity="0.2"/>
</svg>
