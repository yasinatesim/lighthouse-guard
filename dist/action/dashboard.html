<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔦 Lighthouse Guard Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
  }

  .header {
    background: linear-gradient(135deg, #1e293b, #334155);
    padding: 24px 32px;
    border-bottom: 1px solid #334155;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .header h1 { font-size: 24px; display: flex; align-items: center; gap: 12px; }
  .header .meta { font-size: 13px; color: #94a3b8; }

  .status-banner {
    padding: 16px 32px;
    font-size: 18px;
    font-weight: 600;
  }

  .status-banner.passed { background: #064e3b; border-bottom: 2px solid #10b981; }
  .status-banner.failed { background: #7f1d1d; border-bottom: 2px solid #ef4444; }

  .container { max-width: 1200px; margin: 0 auto; padding: 32px; }

  .page-card {
    background: #1e293b;
    border-radius: 12px;
    border: 1px solid #334155;
    margin-bottom: 24px;
    overflow: hidden;
  }

  .page-card-header {
    padding: 16px 24px;
    background: #334155;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .page-card-header h2 { font-size: 18px; display: flex; align-items: center; gap: 8px; }

  .device-badge {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 12px;
    font-weight: 600;
  }

  .device-badge.mobile { background: #7c3aed; }
  .device-badge.desktop { background: #2563eb; }

  .scores-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 16px;
    padding: 24px;
  }

  .score-item { text-align: center; }

  .score-circle {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: 700;
    margin: 0 auto 8px;
    border: 4px solid;
  }

  .score-circle.green { border-color: #10b981; color: #10b981; background: rgba(16,185,129,0.1); }
  .score-circle.yellow { border-color: #f59e0b; color: #f59e0b; background: rgba(245,158,11,0.1); }
  .score-circle.red { border-color: #ef4444; color: #ef4444; background: rgba(239,68,68,0.1); }

  .score-label { font-size: 13px; color: #94a3b8; }

  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    padding: 0 24px 24px;
  }

  .metric-item {
    background: #0f172a;
    padding: 12px 16px;
    border-radius: 8px;
    border: 1px solid #334155;
  }

  .metric-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
  .metric-value { font-size: 20px; font-weight: 700; margin-top: 4px; }

  .runs-section { padding: 0 24px 24px; }

  .runs-toggle {
    background: none;
    border: 1px solid #475569;
    color: #94a3b8;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    width: 100%;
    text-align: left;
  }

  .runs-toggle:hover { background: #334155; color: #e2e8f0; }

  .runs-detail { display: none; margin-top: 12px; }
  .runs-detail.open { display: block; }

  .runs-table { width: 100%; border-collapse: collapse; font-size: 14px; }

  .runs-table th,
  .runs-table td {
    padding: 8px 12px;
    text-align: center;
    border-bottom: 1px solid #334155;
  }

  .runs-table th { color: #64748b; font-size: 12px; text-transform: uppercase; }

  .failures { padding: 0 24px 24px; }

  .failure-item {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 6px;
    padding: 10px 14px;
    margin-bottom: 8px;
    font-size: 14px;
    display: flex;
    justify-content: space-between;
  }

  .failure-item .metric-name { color: #fca5a5; font-weight: 600; }
  .failure-item .values { color: #94a3b8; }
</style>
</head>
<body>

<div class="header">
  <h1>🔦 Lighthouse Guard</h1>
  <div class="meta" id="meta"></div>
</div>

<div class="status-banner" id="status-banner"></div>

<div class="container" id="results-container"></div>

<script>
const RESULTS = __RESULTS_DATA__;

function init() {
  const allPassed = RESULTS.every(r => r.passed);

  document.getElementById('meta').textContent =
    RESULTS.length + ' test | ' + new Date().toLocaleString('tr-TR');

  const banner = document.getElementById('status-banner');
  banner.className = 'status-banner ' + (allPassed ? 'passed' : 'failed');
  banner.textContent = allPassed
    ? '✅ Tüm testler başarılı'
    : '❌ Bazı testler eşik değerini geçemedi';

  const container = document.getElementById('results-container');
  RESULTS.forEach(function(result, idx) {
    const div = document.createElement('div');
    div.innerHTML = renderPageCard(result, idx);
    container.appendChild(div.firstElementChild);
  });

  document.querySelectorAll('.runs-toggle').forEach(function(btn) {
    btn.addEventListener('click', function() {
      const detail = btn.nextElementSibling;
      detail.classList.toggle('open');
      btn.textContent = detail.classList.contains('open')
        ? '▼ Bireysel ölçümleri gizle'
        : '▶ Bireysel ölçümleri göster';
    });
  });
}

function renderPageCard(r, idx) {
  return '<div class="page-card">' +
    '<div class="page-card-header">' +
    '<h2>' + (r.passed ? '✅' : '❌') + ' ' + r.name +
    ' <span class="device-badge ' + r.device + '">' + r.device + '</span></h2>' +
    '<span style="color:#64748b;font-size:13px">' +
    r.successfulRuns + '/' + r.totalRuns + ' run | ' + r.strategy + '</span>' +
    '</div>' +
    '<div class="scores-grid">' +
    renderScore('Performance', r.scores.performance) +
    renderScore('Accessibility', r.scores.accessibility) +
    renderScore('Best Practices', r.scores.bestPractices) +
    renderScore('SEO', r.scores.seo) +
    '</div>' +
    '<div class="metrics-grid">' +
    renderMetric('LCP', r.metrics.lcp, 'ms') +
    renderMetric('FCP', r.metrics.fcp, 'ms') +
    renderMetric('TBT', r.metrics.tbt, 'ms') +
    renderMetric('CLS', r.metrics.cls, '', 3) +
    renderMetric('Speed Index', r.metrics.si, 'ms') +
    renderMetric('TTI', r.metrics.tti, 'ms') +
    '</div>' +
    (r.failures.length > 0 ? renderFailures(r.failures) : '') +
    '<div class="runs-section">' +
    '<button class="runs-toggle">▶ Bireysel ölçümleri göster</button>' +
    '<div class="runs-detail">' +
    '<table class="runs-table"><thead><tr>' +
    '<th>Run</th><th>Perf</th><th>A11y</th><th>BP</th><th>SEO</th>' +
    '</tr></thead><tbody>' +
    r.individualRuns.map(function(run, i) {
      return '<tr><td>' + (i+1) + '</td><td>' + run.performance + '</td><td>' +
        run.accessibility + '</td><td>' + run.bestPractices + '</td><td>' + run.seo + '</td></tr>';
    }).join('') +
    '</tbody></table></div></div></div>';
}

function renderScore(label, score) {
  var color = score >= 90 ? 'green' : score >= 50 ? 'yellow' : 'red';
  return '<div class="score-item"><div class="score-circle ' + color + '">' + score + '</div>' +
    '<div class="score-label">' + label + '</div></div>';
}

function renderMetric(label, value, unit, decimals) {
  var display = decimals ? value.toFixed(decimals) : Math.round(value);
  return '<div class="metric-item"><div class="metric-label">' + label + '</div>' +
    '<div class="metric-value">' + display + unit + '</div></div>';
}

function renderFailures(failures) {
  return '<div class="failures">' +
    failures.map(function(f) {
      return '<div class="failure-item">' +
        '<span class="metric-name">⚠️ ' + f.metric + '</span>' +
        '<span class="values">Actual: <strong>' + f.actual + '</strong> | Beklenen min: <strong>' + f.expected + '</strong></span>' +
        '</div>';
    }).join('') + '</div>';
}

init();
</script>
</body>
</html>
