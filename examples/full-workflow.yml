# .github/workflows/lighthouse.yml
#
# Lighthouse Guard — Full Workflow (all features)
# ─────────────────────────────────────────────────────────────────────────────
# 1. Copy to .github/workflows/lighthouse.yml
# 2. Replace https://your-site.com with your URLs
# 3. Add SLACK_WEBHOOK to Settings → Secrets → Actions (optional)
# 4. Push
#
# Features demonstrated:
#   ✅ Multi-page audit        →  6 pages tested per run
#   ✅ Multi-device testing    →  mobile + desktop
#   ✅ 3-run median strategy   →  outliers eliminated
#   ✅ Score thresholds        →  pipeline breaks on regression
#   ✅ Ban protection          →  jittered delays between requests
#   ✅ Auto-retry              →  Chrome crash recovery
#   ✅ PR comment              →  score table on every PR
#   ✅ Slack notification      →  pass/fail + scores
#   ✅ Dashboard artifact      →  download from Actions → Artifacts
#   ✅ Scheduled audit         →  runs every Monday morning
# ─────────────────────────────────────────────────────────────────────────────

name: Lighthouse Performance Check

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 09:00 UTC

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run Lighthouse Guard
        uses: yasinatesim/lighthouse-guard@v1
        id: lighthouse
        with:
          # ── Pages to audit ────────────────────────────────────────────────
          urls: |
            [
              {"url": "https://your-site.com/",         "name": "Home"},
              {"url": "https://your-site.com/about",    "name": "About"},
              {"url": "https://your-site.com/blog",     "name": "Blog"},
              {"url": "https://your-site.com/projects", "name": "Projects"},
              {"url": "https://your-site.com/contact",  "name": "Contact"}
            ]

          # ── Measurement ───────────────────────────────────────────────────
          # 3 runs per page per device — median eliminates outliers
          runs: 3
          strategy: median
          devices: mobile,desktop

          # ── Score thresholds (0–100) ──────────────────────────────────────
          # Job fails if any page/device falls below these values
          performance-threshold: 80
          accessibility-threshold: 90
          seo-threshold: 90
          best-practices-threshold: 80
          fail-on-threshold: true

          # ── Ban protection ────────────────────────────────────────────────
          # Jitter (+0–30%) is added automatically to both delays
          delay-between-runs: 10000   # 10s between consecutive runs
          delay-between-pages: 15000  # 15s between pages
          max-retries: 3

          # ── Notifications & reporting ─────────────────────────────────────
          slack-webhook: ${{ secrets.SLACK_WEBHOOK }}
          github-token: ${{ github.token }}
          upload-dashboard: true

      # ── Always print outputs, even on failure ─────────────────────────────
      - name: Show Results
        if: always()
        run: |
          echo "passed  : ${{ steps.lighthouse.outputs.passed }}"
          echo "summary : ${{ steps.lighthouse.outputs.summary }}"

      # ── Block deploy if Lighthouse failed ─────────────────────────────────
      - name: Deploy (only if scores pass)
        if: steps.lighthouse.outputs.passed == 'true'
        run: echo "✅ All scores passed — proceeding to deploy"
