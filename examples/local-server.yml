# .github/workflows/lighthouse-local.yml
#
# Lighthouse Guard — Audit a Locally Running Dev Server
# ─────────────────────────────────────────────────────────────────────────────
# Use this when you want to audit your app BEFORE it's deployed.
# Works with: Next.js, Vite, Nuxt, SvelteKit, Express, etc.
#
# 1. Copy to .github/workflows/lighthouse-local.yml
# 2. Adjust the build/start commands for your stack
# 3. Update the localhost URLs to match your routes
# 4. Push
# ─────────────────────────────────────────────────────────────────────────────

name: Lighthouse (Local Server)

on:
  pull_request:
    branches: [main, master]

jobs:
  lighthouse:
    name: Lighthouse Audit (localhost)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install dependencies
        run: npm ci

      # Adjust for your stack:
      #   Next.js    →  npm run build && npm start
      #   Vite       →  npm run build && npx serve dist -p 3000
      #   SvelteKit  →  npm run build && node build/index.js
      - name: Build application
        run: npm run build

      - name: Start application
        run: npm start &
        env:
          PORT: 3000
          NODE_ENV: production

      - name: Wait for server to be ready
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Run Lighthouse Guard
        uses: yasinatesim/lighthouse-guard@v1
        id: lighthouse
        with:
          urls: |
            [
              {"url": "http://localhost:3000/",        "name": "Home"},
              {"url": "http://localhost:3000/about",   "name": "About"},
              {"url": "http://localhost:3000/contact", "name": "Contact"}
            ]
          runs: 2
          strategy: median
          devices: mobile,desktop
          performance-threshold: 85
          accessibility-threshold: 90
          seo-threshold: 85
          best-practices-threshold: 80
          fail-on-threshold: true
          # No delay needed for localhost — no ban risk
          delay-between-runs: 2000
          delay-between-pages: 3000
          max-retries: 2
          github-token: ${{ github.token }}
          upload-dashboard: true

      - name: Show Results
        if: always()
        run: |
          echo "passed  : ${{ steps.lighthouse.outputs.passed }}"
          echo "summary : ${{ steps.lighthouse.outputs.summary }}"
